<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Absensi Geolokasi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e2937 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            max-width: 400px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #0f172a;
            font-size: 32px;
            margin-bottom: 5px;
        }
        .logo .badge {
            background: #ef4444;
            color: white;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ef4444;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #dc2626;
        }
        .btn-login:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .message.error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
            display: block;
        }
        .message.success {
            background: #d1fae5;
            color: #059669;
            border: 1px solid #a7f3d0;
            display: block;
        }
        .info-box {
            margin-top: 25px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 12px;
            font-size: 13px;
            border: 1px solid #e5e7eb;
        }
        .info-box .title {
            font-weight: 600;
            color: #ef4444;
            margin-bottom: 8px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔐 ADMIN</h1>
            <div class="badge">Khusus Admin</div>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="admin" readonly style="background:#f3f4f6">
            </div>
            <div class="form-group">
                <label>Password Admin</label>
                <input type="password" id="password" placeholder="Masukkan password admin" required>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">MASUK KE ADMIN</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="info-box">
            <p class="title">📌 Password Admin</p>
            <p>Password: <strong>admin123</strong></p>
            <p style="margin-top:10px; font-size:11px;">*Ini password tetap, tidak perlu ganti</p>
        </div>
        
        <div class="back-link">
            <a href="index.html">← Kembali ke login karyawan</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const msg = document.getElementById('message');
            
            if (password === 'admin123') {
                msg.className = 'message success';
                msg.textContent = '✅ Login berhasil!';
                setTimeout(() => window.location.href = 'admin.html', 1000);
            } else {
                msg.className = 'message error';
                msg.textContent = '❌ Password admin salah!';
            }
        });
    </script>
</body>
</html>
