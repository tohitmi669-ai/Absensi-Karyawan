<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Karyawan - Absensi Geolokasi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            max-width: 400px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #4f46e5;
            font-size: 32px;
            margin-bottom: 5px;
        }
        .logo p {
            color: #6b7280;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #4338ca;
        }
        .btn-login:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .message.error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
            display: block;
        }
        .message.success {
            background: #d1fae5;
            color: #059669;
            border: 1px solid #a7f3d0;
            display: block;
        }
        .info-box {
            margin-top: 25px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 12px;
            font-size: 13px;
            border: 1px solid #e5e7eb;
        }
        .info-box p {
            margin: 5px 0;
        }
        .info-box .title {
            font-weight: 600;
            color: #4f46e5;
            margin-bottom: 8px;
        }
        .admin-link {
            text-align: center;
            margin-top: 20px;
        }
        .admin-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
        }
        .admin-link a:hover {
            color: #4f46e5;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>📍 ABSENSI</h1>
            <p>Login Karyawan</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="karyawan@perusahaan.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">MASUK</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="info-box">
            <p class="title">🔐 Akun Demo</p>
            <p>Email: karyawan@test.com</p>
            <p>Password: karyawan123</p>
        </div>
        
        <div class="admin-link">
            <a href="login-admin.html">🔑 Login Admin →</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBEE3tPOEtWnRxhkGzyVZYjrdyTpkA-3AE",
            authDomain: "absensi-geolokasi-f8b24.firebaseapp.com",
            projectId: "absensi-geolokasi-f8b24",
            storageBucket: "absensi-geolokasi-f8b24.firebasestorage.app",
            messagingSenderId: "434925560015",
            appId: "1:434925560015:web:56e2a44f5e41e7bd6f97ba"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            if (user) window.location.href = 'dashboard.html';
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const msg = document.getElementById('message');
            
            btn.disabled = true;
            btn.textContent = 'Memproses...';
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    msg.className = 'message success';
                    msg.textContent = '✅ Login berhasil!';
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                })
                .catch((error) => {
                    msg.className = 'message error';
                    msg.textContent = '❌ Email/password salah';
                    btn.disabled = false;
                    btn.textContent = 'MASUK';
                });
        });
    </script>
</body>
</html>
